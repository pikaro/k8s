isClusterService: true
serviceType: ClusterIP
service:
  clusterIP: 10.38.0.10

prometheus:
  service:
    enabled: true
  monitor:
    enabled: true

servers:
- zones:
  - zone: .
  port: 53
  plugins:
  - name: errors

  - name: health
    configBlock: |-
      lameduck 5s

  - name: ready

  - name: log
    parameters: .
    configBlock: |-
      class error

  - name: prometheus
    parameters: :9153

  - name: kubernetes
    parameters: cluster.local in-addr.arpa ip6.arpa
    configBlock: |-
      pods insecure
      fallthrough in-addr.arpa ip6.arpa
      ttl 30

  - name: forward
    parameters: . /etc/resolv.conf
    configBlock: |-
      max_concurrent 1000

  - name: cache
    parameters: 30
    configBlock: |-
      disable success cluster.local
      disable denial cluster.local

  - name: loop
  - name: reload
  - name: loadbalance
