apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: habitsync-jwt-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  length: {{ .Values.externalSecrets.jwtSecretGenerator.length }}
  digits: {{ .Values.externalSecrets.jwtSecretGenerator.digits }}
  symbols: {{ .Values.externalSecrets.jwtSecretGenerator.symbols }}
  noUpper: {{ .Values.externalSecrets.jwtSecretGenerator.noUpper }}
  allowRepeat: {{ .Values.externalSecrets.jwtSecretGenerator.allowRepeat }}
  secretKeys:
    - JWT_SECRET
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: cnpg-database
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    kubernetes:
      remoteNamespace: cnpg-database
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: {{ .Values.externalSecrets.serviceAccountName }}
          namespace: {{ .Release.Namespace }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.database.secretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshPolicy: CreatedOnce
  secretStoreRef:
    kind: SecretStore
    name: cnpg-database
  target:
    name: {{ .Values.database.secretName }}
    creationPolicy: Orphan
    template:
      engineVersion: v2
      type: Opaque
      data:
        SPRING_DATASOURCE_USERNAME: {{ "{{ .username }}" | quote }}
        SPRING_DATASOURCE_PASSWORD: {{ "{{ .password }}" | quote }}
        JWT_SECRET: {{ "{{ .JWT_SECRET }}" | quote }}
        ca.crt: {{ "{{ index . \"ca.crt\" }}" | quote }}
  data:
    - secretKey: username
      remoteRef:
        key: habitsync-db-auth
        property: username
    - secretKey: password
      remoteRef:
        key: habitsync-db-auth
        property: password
    - secretKey: ca.crt
      remoteRef:
        key: cnpg-cluster-ca
        property: ca.crt
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: habitsync-jwt-secret
{{- if .Values.mail.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.mail.secretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: {{ .Values.mail.secretName }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        SPRING_MAIL_USERNAME: {{ .Values.mail.username | quote }}
        SPRING_MAIL_PASSWORD: {{ "{{ .SMTP_RELAY_PASSWORD }}" | quote }}
  data:
    - secretKey: SMTP_RELAY_PASSWORD
      remoteRef:
        key: /external-secrets/mail-relay/sender-password
{{- end }}
