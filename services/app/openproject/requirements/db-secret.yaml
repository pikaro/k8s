apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: openproject-db-password
  namespace: cnpg-database
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  length: 64
  digits: 12
  symbols: 0
  noUpper: false
  allowRepeat: true
  secretKeys:
    - password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openproject-db-auth
  namespace: cnpg-database
  annotations:
    argocd.argoproj.io/sync-wave: "-19"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshPolicy: CreatedOnce
  target:
    name: openproject-db-auth
    creationPolicy: Orphan
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: openproject
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: openproject-db-password
