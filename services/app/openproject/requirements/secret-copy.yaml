apiVersion: v1
kind: ServiceAccount
metadata:
  name: openproject-secret-reader
  namespace: openproject
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openproject-db-secret-reader
  namespace: cnpg-database
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - openproject-db-auth
      - cnpg-cluster-ca
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openproject-db-secret-reader
  namespace: cnpg-database
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
subjects:
  - kind: ServiceAccount
    name: openproject-secret-reader
    namespace: openproject
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openproject-db-secret-reader
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: openproject-secret-key
  namespace: openproject
  annotations:
    argocd.argoproj.io/sync-wave: "-19"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  length: 64
  digits: 12
  symbols: 0
  noUpper: false
  allowRepeat: true
  secretKeys:
    - openproject_SECRET_KEY
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: cnpg-database
  namespace: openproject
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    kubernetes:
      remoteNamespace: cnpg-database
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: openproject-secret-reader
          namespace: openproject
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-cluster-ca
  namespace: openproject
  annotations:
    argocd.argoproj.io/sync-wave: "-17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRef:
    kind: SecretStore
    name: cnpg-database
  target:
    name: cnpg-cluster-ca
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        ca.crt: '{{ index . "ca.crt" }}'
  data:
    - secretKey: ca.crt
      remoteRef:
        key: cnpg-cluster-ca
        property: ca.crt
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openproject-config
  namespace: openproject
  annotations:
    argocd.argoproj.io/sync-wave: "-17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshPolicy: CreatedOnce
  secretStoreRef:
    kind: SecretStore
    name: cnpg-database
  target:
    name: openproject-config
    creationPolicy: Orphan
    template:
      engineVersion: v2
      type: Opaque
      data:
        openproject_SECRET_KEY: "{{ .openproject_SECRET_KEY }}"
        openproject_LOG_LEVEL: info
        openproject_ERROR_REPORTING__ENABLED: "false"
        openproject_POSTGRESQL__HOST: cnpg-cluster-rw.cnpg-database.svc.cluster.local
        openproject_POSTGRESQL__NAME: openproject
        openproject_POSTGRESQL__USER: "{{ .username }}"
        openproject_POSTGRESQL__PASSWORD: "{{ .password }}"
        openproject_POSTGRESQL__PORT: "5432"
        openproject_POSTGRESQL__SSLMODE: verify-full
        openproject_POSTGRESQL__SSLROOTCERT: /postgres-ca/ca.crt
  data:
    - secretKey: username
      remoteRef:
        key: openproject-db-auth
        property: username
    - secretKey: password
      remoteRef:
        key: openproject-db-auth
        property: password
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: openproject-secret-key
