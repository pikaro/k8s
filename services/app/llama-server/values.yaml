namespace: llama-server

labels:
  d-reis.com/context: ai
annotations:
  d-reis.com/context: ai

image:
  repository: ghcr.io/ggml-org/llama.cpp
  tag: server-b9976

persistence:
  enabled: true
  volumes:
    - name: data
      storageClassName: zfs-temp-bulk
      size: 10Gi

container:
  env:
    LLAMA_CACHE: /models
    LLAMA_ARG_HOST: "0.0.0.0"
    LLAMA_ARG_PORT: "8080"
    LLAMA_ARG_HF_REPO: Qwen/Qwen3-4B-GGUF
    LLAMA_ARG_HF_FILE: Qwen3-4B-Q5_K_M.gguf
    LLAMA_ARG_ALIAS: qwen3-4b
    LLAMA_ARG_CTX_SIZE: "8192"
    LLAMA_ARG_N_PARALLEL: "1"
    LLAMA_ARG_CHAT_TEMPLATE_KWARGS: '{"enable_thinking":false}'
    LLAMA_ARG_THREADS: "5"
    LLAMA_ARG_THREADS_BATCH: "5"
    LLAMA_ARG_CACHE_PROMPT: "true"
    LLAMA_ARG_ENDPOINT_SLOTS: "true"
    LLAMA_ARG_SLOT_SAVE_PATH: /models
    LLAMA_ARG_ENDPOINT_METRICS: "true"
    LLAMA_ARG_UI: "false"
  volumeMounts:
    - name: data
      mountPath: /models
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: true
    path: /health
  startupProbe:
    enabled: true
    path: /health

service:
  port: 80

ingress:
  enabled: true
  host: llm.d-reis.com
  tls:
    secretName: llama-server-tls
  annotations:
    external-dns.alpha.kubernetes.io/hostname: llm.d-reis.com
    external-dns.alpha.kubernetes.io/target: thule.d-reis.com
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: traefik-forward-auth@kubernetescrd
  authentikOutpost:
    enabled: true

networkPolicy:
  ingressNamespaces:
    - openwebui
    - traefik
