ollama:
  enabled: false

pipelines:
  enabled: false

tika:
  enabled: false

terminals:
  enabled: false

websocket:
  enabled: true
  manager: redis
  redis:
    enabled: true

replicaCount: 1

ingress:
  enabled: true
  class: "traefik"
  annotations:
    external-dns.alpha.kubernetes.io/hostname: ai.d-reis.com,ai.k8s.d-reis.com
    external-dns.alpha.kubernetes.io/target: thule.d-reis.com
    cert-manager.io/cluster-issuer: letsencrypt
  host: "ai.d-reis.com"
  additionalHosts:
    - "ai.k8s.d-reis.com"
  tls: true
  existingSecret: "openwebui-tls"

persistence:
  enabled: true
  size: 2Gi
  storageClass: "zfs"
  # TODO: Move to S3

service:
  type: ClusterIP

enableOpenaiApi: true
openaiBaseApiUrl: http://llama-server.llama-server.svc.cluster.local/v1
openaiApiKey: not-required

extraEnvVars:
  - name: WEBUI_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: openwebui-secret
        key: token
  - name: ENABLE_PERSISTENT_CONFIG
    value: "false"
  - name: DEFAULT_MODEL_PARAMS
    value: '{"max_tokens":384}'
  - name: DEFAULT_MODEL_METADATA
    value: '{"capabilities":{"file_context":false,"vision":false,"file_upload":false,"web_search":false,"image_generation":false,"code_interpreter":false,"terminal":false,"citations":false,"status_updates":false,"builtin_tools":false}}'
  - name: ENABLE_TITLE_GENERATION
    value: "false"
  - name: ENABLE_TAGS_GENERATION
    value: "false"
  - name: ENABLE_FOLLOW_UP_GENERATION
    value: "false"
  - name: ENABLE_AUTOCOMPLETE_GENERATION
    value: "false"
  - name: ENABLE_SEARCH_QUERY_GENERATION
    value: "false"
  - name: ENABLE_RETRIEVAL_QUERY_GENERATION
    value: "false"
  - name: DATABASE_TYPE
    value: "postgresql"
  - name: DATABASE_USER
    valueFrom:
      secretKeyRef:
        name: openwebui-database
        key: username
  - name: DATABASE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: openwebui-database
        key: password
  - name: DATABASE_HOST
    value: cnpg-cluster-rw.cnpg-database.svc.cluster.local
  - name: DATABASE_PORT
    value: "5432"
  - name: DATABASE_NAME
    value: "openwebui"
  - name: ENABLE_LOGIN_FORM
    value: "false"
  - name: OAUTH_AUTO_REDIRECT
    value: "true"
  - name: AUDIO_STT_ENGINE
    value: openai
  # OpenWebUI requires a static audio model; keep this aligned with nemo-asr /v1/models.
  - name: AUDIO_STT_MODEL
    value: nvidia/stt_en_fastconformer_hybrid_large_streaming_multi
  - name: AUDIO_STT_OPENAI_API_BASE_URL
    value: http://nemo-asr.nemo-asr.svc.cluster.local/v1
  - name: AUDIO_STT_OPENAI_API_KEY
    value: not-required
  - name: AUDIO_TTS_ENGINE
    value: openai
  # OpenWebUI requires static audio settings; keep these aligned with pockettts /health.
  - name: AUDIO_TTS_MODEL
    value: kyutai/pocket-tts
  - name: AUDIO_TTS_VOICE
    value: alba
  - name: AUDIO_TTS_OPENAI_API_BASE_URL
    value: http://pockettts.pockettts.svc.cluster.local/v1
  - name: AUDIO_TTS_OPENAI_API_KEY
    value: not-required

podSecurityContext:
  fsGroupChangePolicy: Always
  sysctls: []
  supplementalGroups: []
  fsGroup: 1001

containerSecurityContext:
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: "RuntimeDefault"

sso:
  enabled: true
  enableSignup: true
  mergeAccountsByEmail: true
  # enableRoleManagement: true
  enableGroupManagement: true
  oidc:
    enabled: true
    clientExistingSecret: "openwebui-sso"
    clientIdExistingSecretKey: "client_id"
    clientExistingSecretKey: "client_secret"
    providerUrl: "https://sso.d-reis.com/application/o/openwebui/.well-known/openid-configuration"
    providerName: "Authentik"
    scopes: "openid email profile"
  # roleManagement:
  #   rolesClaim: "roles"
  #   allowedRoles: ""
  #   adminRoles: ""
  groupManagement:
    groupsClaim: "groups"

logging:
  level: "info"
