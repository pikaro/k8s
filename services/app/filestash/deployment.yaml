apiVersion: apps/v1
kind: Deployment
metadata:
  name: filestash
  labels:
    app.kubernetes.io/name: filestash
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: filestash
  template:
    metadata:
      labels:
        app.kubernetes.io/name: filestash
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-state
          image: machines/filestash:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              if [ ! -e /state/config/config.json ]; then
                cp -a /app/data/state/. /state/
              fi
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: state
              mountPath: /state
      containers:
        - name: filestash
          image: machines/filestash:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8334
          env:
            - name: APPLICATION_URL
              value: https://files.d-reis.com
            - name: CANARY
              value: "true"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: state
              mountPath: /app/data/state
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: filestash-state
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filestash-state
  labels:
    app.kubernetes.io/name: filestash
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: zfs
  resources:
    requests:
      storage: 2Gi
