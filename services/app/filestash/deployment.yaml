apiVersion: apps/v1
kind: Deployment
metadata:
  name: filestash
  labels:
    app.kubernetes.io/name: filestash
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: filestash
  template:
    metadata:
      labels:
        app.kubernetes.io/name: filestash
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-state
          image: machines/filestash:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              if [ ! -e /state/.filestash-state-initialized ]; then
                cp -R /app/data/state/. /state/
                touch /state/.filestash-state-initialized
              fi
              mkdir -p /state/config
              sed "s|__FILESTASH_SECRET_KEY__|${FILESTASH_SECRET_KEY}|g" \
                /config-template/config.json.tpl > /state/config/config.json
              chmod 0660 /state/config/config.json
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: FILESTASH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: filestash-config
                  key: FILESTASH_SECRET_KEY
          volumeMounts:
            - name: state
              mountPath: /state
            - name: config-template
              mountPath: /config-template
              readOnly: true
      containers:
        - name: filestash
          image: machines/filestash:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8334
          env:
            - name: CANARY
              value: "true"
            - name: CONFIG_ENCRYPT
              value: "false"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: filestash-s3-auth
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: filestash-s3-auth
                  key: AWS_SECRET_ACCESS_KEY
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: state
              mountPath: /app/data/state
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: filestash-state
        - name: config-template
          configMap:
            name: filestash-config-template
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filestash-state
  labels:
    app.kubernetes.io/name: filestash
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: zfs
  resources:
    requests:
      storage: 2Gi
