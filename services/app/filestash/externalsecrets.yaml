apiVersion: v1
kind: ServiceAccount
metadata:
  name: filestash-secret-reader
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: filestash-secret-key
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  length: 16
  digits: 4
  symbols: 0
  noUpper: false
  allowRepeat: true
  secretKeys:
    - FILESTASH_SECRET_KEY
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: filestash-config
  annotations:
    argocd.argoproj.io/sync-wave: "-19"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshPolicy: CreatedOnce
  target:
    name: filestash-config
    creationPolicy: Orphan
    template:
      engineVersion: v2
      type: Opaque
      data:
        FILESTASH_SECRET_KEY: "{{ .FILESTASH_SECRET_KEY }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: filestash-secret-key
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: object-store
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    kubernetes:
      remoteNamespace: object-store
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: filestash-secret-reader
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: filestash-s3-auth
  annotations:
    argocd.argoproj.io/sync-wave: "-17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRef:
    kind: SecretStore
    name: object-store
  target:
    name: filestash-s3-auth
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY }}"
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: object-store-gateway-s3-auth
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: object-store-gateway-s3-auth
        property: AWS_SECRET_ACCESS_KEY
