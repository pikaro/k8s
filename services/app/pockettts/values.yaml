namespace: pockettts

labels:
  d-reis.com/context: ai
annotations:
  d-reis.com/context: ai

image:
  repository: ghcr.io/pikaro/ai-tts
  tag: sha-35ef528

persistence:
  enabled: true
  volumes:
    - name: data
      storageClassName: zfs-temp-bulk

container:
  env:
    HF_HOME: /models/huggingface
    TTS_DATA_DIRECTORY: /models/custom
    TTS_VOICE: attenborough
  volumeMounts:
    - name: data
      mountPath: /models
  livenessProbe:
    enabled: true
  readinessProbe:
    enabled: true
  startupProbe:
    enabled: true

service:
  port: 80

ingress:
  enabled: true
  host: tts.d-reis.com
  tls:
    secretName: pockettts-tls
  annotations:
    external-dns.alpha.kubernetes.io/hostname: tts.d-reis.com
    external-dns.alpha.kubernetes.io/target: thule.d-reis.com
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: traefik-forward-auth@kubernetescrd
  authentikOutpost:
    enabled: true

networkPolicy:
  ingressNamespaces:
    - openwebui
    - traefik
    - assistant
