apiVersion: v1
kind: Namespace
metadata:
  name: vikunja
  annotations:
    volsync.backube/privileged-movers: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: volsync-rsyncnet-known-hosts
  namespace: vikunja
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
type: Opaque
data:
  known_hosts: 
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: SSHKey
metadata:
  name: volsync-rsyncnet-backup-ssh
  namespace: vikunja
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  keyType: "ed25519"
  comment: "volsync-vikunja@thule"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: volsync-rsyncnet-backup-ssh
  namespace: vikunja
  annotations:
    argocd.argoproj.io/sync-wave: "-19"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshPolicy: CreatedOnce
  target:
    name: volsync-rsyncnet-backup-ssh
    creationPolicy: Orphan
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: SSHKey
          name: volsync-rsyncnet-backup-ssh
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vikunja-data-restic
  namespace: vikunja
  annotations:
    argocd.argoproj.io/sync-wave: "-17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: vikunja-data-restic
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        RESTIC_REPOSITORY: rclone:rsyncnet:object-store/thule/backups/volsync/vikunja/vikunja-data
        RESTIC_PASSWORD: "{{ .RESTIC_PASSWORD }}"
        RCLONE_CONFIG_RSYNCNET_TYPE: sftp
        RCLONE_CONFIG_RSYNCNET_HOST: zh3928.rsync.net
        RCLONE_CONFIG_RSYNCNET_USER: zh3928
        RCLONE_CONFIG_RSYNCNET_PORT: "22"
        RCLONE_CONFIG_RSYNCNET_KEY_FILE: /mnt/rsyncnet-ssh/id_ed25519
        RCLONE_CONFIG_RSYNCNET_KNOWN_HOSTS_FILE: /mnt/rsyncnet-known-hosts/known_hosts
        RCLONE_CONFIG_RSYNCNET_SHELL_TYPE: unix
  data:
    - secretKey: RESTIC_PASSWORD
      remoteRef:
        key: /external-secrets/volsync/restic-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vikunja-database-restic
  namespace: vikunja
  annotations:
    argocd.argoproj.io/sync-wave: "-17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: vikunja-database-restic
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        RESTIC_REPOSITORY: rclone:rsyncnet:object-store/thule/backups/volsync/vikunja/vikunja-database
        RESTIC_PASSWORD: "{{ .RESTIC_PASSWORD }}"
        RCLONE_CONFIG_RSYNCNET_TYPE: sftp
        RCLONE_CONFIG_RSYNCNET_HOST: zh3928.rsync.net
        RCLONE_CONFIG_RSYNCNET_USER: zh3928
        RCLONE_CONFIG_RSYNCNET_PORT: "22"
        RCLONE_CONFIG_RSYNCNET_KEY_FILE: /mnt/rsyncnet-ssh/id_ed25519
        RCLONE_CONFIG_RSYNCNET_KNOWN_HOSTS_FILE: /mnt/rsyncnet-known-hosts/known_hosts
        RCLONE_CONFIG_RSYNCNET_SHELL_TYPE: unix
  data:
    - secretKey: RESTIC_PASSWORD
      remoteRef:
        key: /external-secrets/volsync/restic-password
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: vikunja-data
  namespace: vikunja
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  sourcePVC: vikunja-data
  trigger:
    schedule: "35 3 * * *"
  restic:
    repository: vikunja-data-restic
    copyMethod: Direct
    pruneIntervalDays: 7
    cacheStorageClassName: zfs-temp
    retain:
      daily: 7
      weekly: 4
      monthly: 12
    moverVolumes:
      - mountPath: rsyncnet-ssh
        volumeSource:
          secret:
            secretName: volsync-rsyncnet-backup-ssh
            defaultMode: 0400
            items:
              - key: privateKey
                path: id_ed25519
      - mountPath: rsyncnet-known-hosts
        volumeSource:
          secret:
            secretName: volsync-rsyncnet-known-hosts
            defaultMode: 0444
            items:
              - key: known_hosts
                path: known_hosts
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: vikunja-database
  namespace: vikunja
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  sourcePVC: vikunja-database
  trigger:
    schedule: "45 3 * * *"
  restic:
    repository: vikunja-database-restic
    copyMethod: Direct
    pruneIntervalDays: 7
    cacheStorageClassName: zfs-temp
    retain:
      daily: 7
      weekly: 4
      monthly: 12
    moverVolumes:
      - mountPath: rsyncnet-ssh
        volumeSource:
          secret:
            secretName: volsync-rsyncnet-backup-ssh
            defaultMode: 0400
            items:
              - key: privateKey
                path: id_ed25519
      - mountPath: rsyncnet-known-hosts
        volumeSource:
          secret:
            secretName: volsync-rsyncnet-known-hosts
            defaultMode: 0444
            items:
              - key: known_hosts
                path: known_hosts
