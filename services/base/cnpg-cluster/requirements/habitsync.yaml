apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: habitsync-db-password
  namespace: cnpg-database
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  length: 64
  digits: 12
  symbols: 0
  noUpper: false
  allowRepeat: true
  secretKeys:
    - password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: habitsync-db-auth
  namespace: cnpg-database
  annotations:
    argocd.argoproj.io/sync-wave: "-19"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshPolicy: CreatedOnce
  target:
    name: habitsync-db-auth
    creationPolicy: Orphan
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: habitsync
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: habitsync-db-password
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: cnpg-cluster-habitsync
  namespace: cnpg-database
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  name: habitsync
  cluster:
    name: cnpg-cluster
  owner: habitsync
  databaseReclaimPolicy: retain
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: habitsync-db-secret-reader
  namespace: cnpg-database
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - habitsync-db-auth
      - cnpg-cluster-ca
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: habitsync-db-secret-reader
  namespace: cnpg-database
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
subjects:
  - kind: ServiceAccount
    name: habitsync-secret-reader
    namespace: habitsync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: habitsync-db-secret-reader
