apiVersion: v1
kind: ServiceAccount
metadata:
  name: authentik-secret-reader
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: authentik-db-secret-reader
  namespace: cnpg-database
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - authentik-db-auth
      - cnpg-cluster-ca
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: authentik-db-secret-reader
  namespace: cnpg-database
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
subjects:
  - kind: ServiceAccount
    name: authentik-secret-reader
    namespace: authentik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: authentik-db-secret-reader
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: authentik-secret-key
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "-19"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  length: 64
  digits: 12
  symbols: 0
  noUpper: false
  allowRepeat: true
  secretKeys:
    - AUTHENTIK_SECRET_KEY
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: cnpg-database
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    kubernetes:
      remoteNamespace: cnpg-database
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: authentik-secret-reader
          namespace: authentik
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-cluster-ca
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "-17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRef:
    kind: SecretStore
    name: cnpg-database
  target:
    name: cnpg-cluster-ca
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        ca.crt: "{{ index . \"ca.crt\" }}"
  data:
    - secretKey: ca.crt
      remoteRef:
        key: cnpg-cluster-ca
        property: ca.crt
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-config
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "-17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshPolicy: CreatedOnce
  secretStoreRef:
    kind: SecretStore
    name: cnpg-database
  target:
    name: authentik-config
    creationPolicy: Orphan
    template:
      engineVersion: v2
      type: Opaque
      data:
        AUTHENTIK_SECRET_KEY: "{{ .AUTHENTIK_SECRET_KEY }}"
        AUTHENTIK_LOG_LEVEL: info
        AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
        AUTHENTIK_POSTGRESQL__HOST: cnpg-cluster-rw.cnpg-database.svc.cluster.local
        AUTHENTIK_POSTGRESQL__NAME: authentik
        AUTHENTIK_POSTGRESQL__USER: "{{ .username }}"
        AUTHENTIK_POSTGRESQL__PASSWORD: "{{ .password }}"
        AUTHENTIK_POSTGRESQL__PORT: "5432"
        AUTHENTIK_POSTGRESQL__SSLMODE: verify-ca
        AUTHENTIK_POSTGRESQL__SSLROOTCERT: /postgres-ca/ca.crt
  data:
    - secretKey: username
      remoteRef:
        key: authentik-db-auth
        property: username
    - secretKey: password
      remoteRef:
        key: authentik-db-auth
        property: password
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: authentik-secret-key
