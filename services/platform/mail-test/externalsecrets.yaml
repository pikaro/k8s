apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mail-test-smtp
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: mail-test-smtp
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        SMTP_USERNAME: relay@d-reis.com
        SMTP_PASSWORD: "{{ .SMTP_RELAY_PASSWORD }}"
  data:
    - secretKey: SMTP_RELAY_PASSWORD
      remoteRef:
        key: /external-secrets/mail-relay/sender-password
