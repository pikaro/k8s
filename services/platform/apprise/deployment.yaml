apiVersion: apps/v1
kind: Deployment
metadata:
  name: apprise
  labels:
    app.kubernetes.io/name: apprise
    app.kubernetes.io/part-of: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apprise
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apprise
        app.kubernetes.io/part-of: observability
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: apprise
          image: caronc/apprise:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APPRISE_STATEFUL_MODE
              value: simple
            - name: APPRISE_CONFIG_DIR
              value: /config
            - name: APPRISE_STORAGE_DIR
              value: ""
            - name: APPRISE_CONFIG_LOCK
              value: "yes"
            - name: APPRISE_API_ONLY
              value: "yes"
            - name: APPRISE_ATTACH_SIZE
              value: "0"
            - name: APPRISE_WORKER_COUNT
              value: "1"
            - name: APPRISE_ALLOW_SERVICES
              value: mailto
            - name: TZ
              value: Europe/Berlin
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 96Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          secret:
            secretName: apprise-config
            optional: true
        - name: tmp
          emptyDir:
            medium: Memory
