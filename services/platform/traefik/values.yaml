ports:
  web:
    expose:
      default: true
    port: 80
    hostPort: 80
    redirections:
      entryPoint:
        to: websecure
        scheme: https
        permanent: true
  websecure:
    expose:
      default: true
    port: 443
    hostPort: 443
  metrics:
    port: 9101 # Avoid conflicts with host
    expose:
      default: false

hostNetwork: true

deployment:
  dnsPolicy: ClusterFirstWithHostNet

service:
  enabled: false

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true

logs:
  general:
    level: INFO

metrics:
  prometheus:
    disableAPICheck: true
    service:
      enabled: true
    serviceMonitor:
      enabled: true
      relabelings:
        - targetLabel: __address__
          replacement: traefik-metrics.traefik.svc.cluster.local:9101

updateStrategy:
  type: Recreate

additionalArguments:
  - "--providers.kubernetesingress.ingressendpoint.hostname=thule.d-reis.com"

securityContext:
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]
  readOnlyRootFilesystem: true
  runAsGroup: 0
  runAsNonRoot: false
  runAsUser: 0

podSecurityContext:
  fsGroup: 0
