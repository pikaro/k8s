apiVersion: v1
kind: Namespace
metadata:
  name: oidc
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oidc-issuer
  namespace: oidc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oidc-issuer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oidc-issuer
    spec:
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: docs
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: docs
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: docs
          configMap:
            name: oidc-issuer-docs
            items:
              - key: oidc.json
                path: .well-known/openid-configuration
              - key: jwks.json
                path: openid/v1/jwks
              - key: default.conf
                path: default.conf

---
apiVersion: v1
kind: Service
metadata:
  name: oidc-issuer
  namespace: oidc
spec:
  selector:
    app.kubernetes.io/name: oidc-issuer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oidc-issuer
  namespace: oidc
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    external-dns.alpha.kubernetes.io/hostname: oidc.k8s.d-reis.com
spec:
  ingressClassName: traefik
  tls:
    - secretName: oidc-issuer-tls
      hosts:
        - oidc.k8s.d-reis.com
  rules:
    - host: oidc.k8s.d-reis.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oidc-issuer
                port:
                  number: 80
