global:
  domain: argo.d-reis.com

configs:
  params:
    server.insecure: true

redis-ha:
  enabled: false

controller:
  replicas: 1

server:
  autoscaling:
    enabled: true
    minReplicas: 1

  ingress:
    enabled: true
    ingressClassName: "traefik"

    annotations:
      external-dns.alpha.kubernetes.io/hostname: argo.d-reis.com,argo.k8s.d-reis.com
      external-dns.alpha.kubernetes.io/target: thule.d-reis.com

    tls: true
    extraHosts:
      - name: argo.k8s.d-reis.com
        path: /

  certificate:
    enabled: true
    additionalHosts:
      - argo.k8s.d-reis.com
    issuer:
      kind: ClusterIssuer
      name: letsencrypt

repoServer:
  autoscaling:
    enabled: true
    minReplicas: 1

applicationSet:
  replicas: 1
