global:
  domain: argo.d-reis.com

redis-ha:
  enabled: false

controller:
  replicas: 1

server:
  autoscaling:
    enabled: true
    minReplicas: 1

  ingress:
    enabled: true
    ingressClassName: "traefik"

    annotations:
      external-dns.alpha.kubernetes.io/hostname: argo.k8s.d-reis.com
      cert-manager.io/cluster-issuer: letsencrypt

    extraTls:
      - hosts:
        - argo.d-reis.com

    tls: true

repoServer:
  autoscaling:
    enabled: true
    minReplicas: 1

applicationSet:
  replicas: 1

