global:
  domain: argo.d-reis.com

configs:
  params:
    server.insecure: true

  cm:
    admin.enabled: "false"

    oidc.config: |
      name: Authentik

      issuer: $argocd-sso:issuer
      clientID: $argocd-sso:client_id
      clientSecret: $argocd-sso:client_secret

      requestedIDTokenClaims:
        groups:
          essential: true

  rbac:
    policy.default: role:none
    policy.csv: |
      g, global-users, role:readonly
      g, argocd-users, role:readonly
      g, global-admins, role:admin
      g, argocd-admins, role:admin

redis-ha:
  enabled: false

redis:
  exporter:
    enabled: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

controller:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

dex:
  enabled: false
  metrics:
    enabled: false
    serviceMonitor:
      enabled: false

server:
  autoscaling:
    enabled: true
    minReplicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  ingress:
    enabled: true
    ingressClassName: "traefik"

    annotations:
      external-dns.alpha.kubernetes.io/hostname: argo.d-reis.com,argo.k8s.d-reis.com
      external-dns.alpha.kubernetes.io/target: thule.d-reis.com

    tls: true
    extraHosts:
      - name: argo.k8s.d-reis.com
        path: /

  certificate:
    enabled: true
    additionalHosts:
      - argo.k8s.d-reis.com
    issuer:
      kind: ClusterIssuer
      name: letsencrypt

repoServer:
  autoscaling:
    enabled: true
    minReplicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

applicationSet:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

notifications:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
