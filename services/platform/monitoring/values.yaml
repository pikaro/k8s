fullnameOverride: monitoring

crds:
  enabled: false

kubeApiServer:
  enabled: true

kubelet:
  enabled: true
  serviceMonitor:
    # Avoid direct node-IP scrapes; this cluster reaches kubelet reliably through the API server proxy.
    relabelings: &kubeletApiProxyRelabelings
      - action: replace
        regex: (.*)
        separator: ;
        targetLabel: cluster
        replacement: thule
      - action: replace
        regex: (.*)
        separator: ;
        targetLabel: __address__
        replacement: kubernetes.default.svc:443
      - action: replace
        sourceLabels:
          - __metrics_path__
        regex: (.*)
        separator: ;
        targetLabel: metrics_path
        replacement: ${1}
      - action: replace
        sourceLabels:
          - __meta_kubernetes_endpoint_address_target_name
          - __metrics_path__
        separator: ;
        regex: (.+);/(.+)
        targetLabel: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/${2}
    cAdvisorRelabelings: *kubeletApiProxyRelabelings
    probesRelabelings: *kubeletApiProxyRelabelings
    resourceRelabelings: *kubeletApiProxyRelabelings

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false

kubeProxy:
  enabled: false

coreDns:
  enabled: false

kube-state-metrics:
  fullnameOverride: kube-state-metrics
  prometheus:
    monitor:
      relabelings:
        - action: replace
          regex: (.*)
          separator: ;
          targetLabel: cluster
          replacement: thule

nodeExporter:
  enabled: false

prometheus-node-exporter:
  fullnameOverride: node-exporter

grafana:
  enabled: true
  defaultDashboardsTimezone: Europe/Berlin
  deploymentStrategy:
    type: Recreate
    rollingUpdate: null

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      external-dns.alpha.kubernetes.io/hostname: o11y.d-reis.com,grafana.k8s.d-reis.com
      external-dns.alpha.kubernetes.io/target: thule.d-reis.com
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - o11y.d-reis.com
      - grafana.k8s.d-reis.com
    tls:
      - secretName: grafana-tls
        hosts:
          - o11y.d-reis.com
          - grafana.k8s.d-reis.com

  persistence:
    enabled: true
    type: pvc
    storageClassName: zfs
    accessModes:
      - ReadWriteOnce
    size: 2Gi

  env:
    GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "true"

  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-sso
        key: client_id
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-sso
        key: client_secret
    GF_AUTH_GENERIC_OAUTH_AUTH_URL:
      secretKeyRef:
        name: grafana-sso
        key: auth_url
    GF_AUTH_GENERIC_OAUTH_TOKEN_URL:
      secretKeyRef:
        name: grafana-sso
        key: token_url
    GF_AUTH_GENERIC_OAUTH_API_URL:
      secretKeyRef:
        name: grafana-sso
        key: api_url
    GF_AUTH_JWT_JWK_SET_URL:
      secretKeyRef:
        name: grafana-mcp-sso
        key: jwk_set_url
        optional: true
    GF_AUTH_JWT_EXPECT_CLAIMS:
      secretKeyRef:
        name: grafana-mcp-sso
        key: expect_claims
        optional: true

  grafana.ini:
    server:
      root_url: https://o11y.d-reis.com/
    date_formats:
      default_timezone: Europe/Berlin
    auth.generic_oauth:
      enabled: true
      name: Authentik
      allow_sign_up: true
      scopes: openid email profile
      auth_url: $__env{GF_AUTH_GENERIC_OAUTH_AUTH_URL}
      token_url: $__env{GF_AUTH_GENERIC_OAUTH_TOKEN_URL}
      api_url: $__env{GF_AUTH_GENERIC_OAUTH_API_URL}
      login_attribute_path: preferred_username
      name_attribute_path: name
      email_attribute_path: email
      groups_attribute_path: groups
      allowed_groups: global-users,global-admins,grafana-users,grafana-admins
      role_attribute_path: "contains(groups[*], 'global-admins') && 'Admin' || contains(groups[*], 'grafana-admins') && 'Admin' || contains(groups[*], 'global-users') && 'Viewer' || contains(groups[*], 'grafana-users') && 'Viewer' || 'None'"
      role_attribute_strict: true
      use_pkce: true
    auth.jwt:
      enabled: true
      header_name: X-JWT-Assertion
      username_claim: preferred_username
      name_claim: name
      email_claim: email
      auto_sign_up: true
      jwk_set_url: $__env{GF_AUTH_JWT_JWK_SET_URL}
      expect_claims: $__env{GF_AUTH_JWT_EXPECT_CLAIMS}
      role_attribute_path: "contains(groups[*], 'global-admins') && 'Admin' || contains(groups[*], 'grafana-admins') && 'Admin' || contains(groups[*], 'global-users') && 'Viewer' || contains(groups[*], 'grafana-users') && 'Viewer' || 'None'"
      role_attribute_strict: true
    users:
      auto_assign_org_role: Viewer

  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
      labelValue: "1"
      watchMethod: WATCH
      skipReload: true
      initDashboards: false
    datasources:
      enabled: true
      searchNamespace: ALL
      label: grafana_datasource
      labelValue: "1"
      watchMethod: WATCH
      skipReload: true
      initDatasources: false

  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki-gateway.observability.svc.cluster.local/
      isDefault: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: zfs
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi

prometheus:
  enabled: true
  additionalRulesForClusterRole:
    - apiGroups:
        - ""
      resources:
        - nodes/proxy
      verbs:
        - get
  prometheusSpec:
    replicas: 1
    shards: 1
    retention: 14d
    retentionSize: 8GB
    scrapeInterval: 30s
    evaluationInterval: 30s
    enableAdminAPI: false
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    probeSelectorNilUsesHelmValues: false
    probeSelector: {}
    probeNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: zfs
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
