apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: object-store-gateway-s3-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  length: {{ .Values.s3.secretGenerator.length }}
  digits: {{ .Values.s3.secretGenerator.digits }}
  symbols: {{ .Values.s3.secretGenerator.symbols }}
  noUpper: {{ .Values.s3.secretGenerator.noUpper }}
  allowRepeat: {{ .Values.s3.secretGenerator.allowRepeat }}
  secretKeys:
    - AWS_SECRET_ACCESS_KEY
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: SSHKey
metadata:
  name: object-store-gateway-rsyncnet-ssh
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  keyType: "ed25519"
  comment: "object-store-gateway@thule"
{{- range $user := .Values.restic.users }}
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: {{ include "object-store-gateway.resticPasswordGeneratorName" $user }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  length: {{ $.Values.restic.secretGenerator.length }}
  digits: {{ $.Values.restic.secretGenerator.digits }}
  symbols: {{ $.Values.restic.secretGenerator.symbols }}
  noUpper: {{ $.Values.restic.secretGenerator.noUpper }}
  allowRepeat: {{ $.Values.restic.secretGenerator.allowRepeat }}
  secretKeys:
    - RESTIC_REST_PASSWORD
{{- end }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: object-store-gateway-s3-auth
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-19"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshPolicy: CreatedOnce
  target:
    name: object-store-gateway-s3-auth
    creationPolicy: Orphan
    template:
      engineVersion: v2
      type: Opaque
      data:
        AWS_ACCESS_KEY_ID: {{ .Values.s3.accessKeyID | quote }}
        AWS_SECRET_ACCESS_KEY: {{ "{{ .AWS_SECRET_ACCESS_KEY }}" | quote }}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: object-store-gateway-s3-secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: object-store-gateway-rsyncnet-ssh
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-19"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshPolicy: CreatedOnce
  target:
    name: object-store-gateway-rsyncnet-ssh
    creationPolicy: Orphan
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: SSHKey
          name: object-store-gateway-rsyncnet-ssh
{{- range $user := .Values.restic.users }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "object-store-gateway.resticSecretName" $user }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-19"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshPolicy: CreatedOnce
  target:
    name: {{ include "object-store-gateway.resticSecretName" $user }}
    creationPolicy: Orphan
    template:
      engineVersion: v2
      type: Opaque
      data:
        RESTIC_REST_USERNAME: {{ $user.namespace | quote }}
        RESTIC_REST_PASSWORD: {{ "{{ .RESTIC_REST_PASSWORD }}" | quote }}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: {{ include "object-store-gateway.resticPasswordGeneratorName" $user }}
{{- end }}
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: object-store-gateway
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    kubernetes:
      remoteNamespace: {{ .Release.Namespace }}
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: object-store-gateway-secret-reader
          namespace: {{ .Release.Namespace }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: volsync-restic-htpasswd
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRef:
    kind: SecretStore
    name: object-store-gateway
  target:
    name: volsync-restic-htpasswd
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        htpasswd: |
          {{- range $user := .Values.restic.users }}
          {{ printf "{{ htpasswd %q (index . %q) }}" $user.namespace (include "object-store-gateway.resticPasswordKey" $user) }}
          {{- end }}
  data:
    {{- range $user := .Values.restic.users }}
    - secretKey: {{ include "object-store-gateway.resticPasswordKey" $user }}
      remoteRef:
        key: {{ include "object-store-gateway.resticSecretName" $user }}
        property: RESTIC_REST_PASSWORD
    {{- end }}
