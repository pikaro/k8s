apiVersion: v1
kind: ServiceAccount
metadata:
  name: object-store-gateway-secret-reader
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
  labels:
    {{- include "object-store-gateway.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: object-store-gateway-secret-reader
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
  labels:
    {{- include "object-store-gateway.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      {{- range $user := .Values.restic.users }}
      - {{ include "object-store-gateway.resticSecretName" $user }}
      {{- end }}
    verbs: ["get"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: object-store-gateway-secret-reader
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
  labels:
    {{- include "object-store-gateway.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: object-store-gateway-secret-reader
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: object-store-gateway-secret-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: object-store-gateway-s3-auth-reader
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
  labels:
    {{- include "object-store-gateway.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - object-store-gateway-s3-auth
    verbs: ["get"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
{{- range $reader := .Values.s3.readers }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-s3-auth-reader" $reader.namespace | trunc 63 | trimSuffix "-" }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
  labels:
    {{- include "object-store-gateway.labels" $ | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ $reader.serviceAccount }}
    namespace: {{ $reader.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: object-store-gateway-s3-auth-reader
{{- end }}
{{- range $user := .Values.restic.users }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "object-store-gateway.resticSecretName" $user }}-reader
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
  labels:
    {{- include "object-store-gateway.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ include "object-store-gateway.resticSecretName" $user }}
    verbs: ["get"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "object-store-gateway.resticSecretName" $user }}-reader
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
  labels:
    {{- include "object-store-gateway.labels" $ | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ $user.serviceAccount }}
    namespace: {{ $user.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "object-store-gateway.resticSecretName" $user }}-reader
{{- end }}
