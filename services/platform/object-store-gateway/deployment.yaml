apiVersion: apps/v1
kind: Deployment
metadata:
  name: object-store-gateway
  labels:
    app.kubernetes.io/name: object-store-gateway
    app.kubernetes.io/part-of: object-storage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: object-store-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: object-store-gateway
        app.kubernetes.io/part-of: object-storage
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: scan-rsyncnet-host-key
          image: alpine/git:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - ssh-keyscan -T 10 -t rsa,ecdsa,ed25519 zh3928.rsync.net > /known-hosts/known_hosts
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: known-hosts
              mountPath: /known-hosts
      containers:
        - name: rclone
          image: rclone/rclone:latest
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - s3
            - $(RCLONE_REMOTE)
            - --addr
            - :9000
            - --auth-key
            - $(AWS_ACCESS_KEY_ID),$(AWS_SECRET_ACCESS_KEY)
            - --log-format
            - date,time,microseconds
            - --log-level
            - INFO
          ports:
            - name: s3
              containerPort: 9000
          env:
            - name: HOME
              value: /tmp
            - name: RCLONE_CACHE_DIR
              value: /tmp/rclone-cache
            - name: RCLONE_REMOTE
              value: rsyncnet:object-store/thule
            - name: RCLONE_CONFIG
              value: /dev/null
            - name: RCLONE_CONFIG_RSYNCNET_TYPE
              value: sftp
            - name: RCLONE_CONFIG_RSYNCNET_PORT
              value: "22"
            - name: RCLONE_CONFIG_RSYNCNET_KEY_FILE
              value: /ssh/id_ed25519
            - name: RCLONE_CONFIG_RSYNCNET_KNOWN_HOSTS_FILE
              value: /known-hosts/known_hosts
            - name: RCLONE_CONFIG_RSYNCNET_SHELL_TYPE
              value: unix
            - name: RCLONE_CONFIG_RSYNCNET_HOST
              value: zh3928.rsync.net
            - name: RCLONE_CONFIG_RSYNCNET_USER
              value: zh3928
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: object-store-gateway-s3-auth
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: object-store-gateway-s3-auth
                  key: AWS_SECRET_ACCESS_KEY
          readinessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: ssh
              mountPath: /ssh
              readOnly: true
            - name: known-hosts
              mountPath: /known-hosts
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: ssh
          secret:
            secretName: object-store-gateway-rsyncnet-ssh
            defaultMode: 0440
            items:
              - key: privateKey
                path: id_ed25519
        - name: known-hosts
          emptyDir:
            medium: Memory
        - name: tmp
          emptyDir:
            medium: Memory
