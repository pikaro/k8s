deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2026-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 168h
  compactor:
    retention_enabled: true
    delete_request_store: filesystem

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: zfs-bulk
    size: 10Gi

gateway:
  enabled: true
  nginxConfig:
    resolver: coredns.kube-system.svc.cluster.local.

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

test:
  enabled: false

lokiCanary:
  enabled: false

minio:
  enabled: false

monitoring:
  dashboards:
    enabled: true
  rules:
    enabled: true
    alerting: false
  serviceMonitor:
    enabled: true
