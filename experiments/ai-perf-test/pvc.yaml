apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nemo-asr-cache
  namespace: ai-perf-test
  labels:
    app.kubernetes.io/name: ai-perf-test
spec:
  storageClassName: zfs-bulk
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
---
