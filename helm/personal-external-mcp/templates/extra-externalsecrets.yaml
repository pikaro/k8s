{{- range $secret := .Values.extraExternalSecrets }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ required "extraExternalSecrets[].name is required" $secret.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "personal-external-mcp.labels" $ | nindent 4 }}
    {{- with $secret.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $secret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $secret.refreshInterval }}
  refreshInterval: {{ . | quote }}
  {{- end }}
  secretStoreRef:
    name: {{ required "extraExternalSecrets[].secretStoreRef.name is required" $secret.secretStoreRef.name | quote }}
    kind: {{ default "ClusterSecretStore" $secret.secretStoreRef.kind | quote }}
  target:
    name: {{ required "extraExternalSecrets[].target.name is required" $secret.target.name | quote }}
    creationPolicy: {{ default "Owner" $secret.target.creationPolicy | quote }}
    {{- with $secret.target.template }}
    template:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- with $secret.data }}
  data:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $secret.dataFrom }}
  dataFrom:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
