{{- if .Values.authentikOutpost.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "personal-external-mcp.fullname" . }}-authentik-outpost
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "personal-external-mcp.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ required "host is required" .Values.host }}`) && PathPrefix(`/outpost.goauthentik.io`)
      kind: Rule
      priority: 100
      services:
        - name: {{ .Values.authentikOutpost.serviceName }}
          namespace: {{ .Values.authentikOutpost.serviceNamespace }}
          port: {{ .Values.authentikOutpost.servicePort }}
  tls:
    secretName: {{ required "tlsSecret is required" .Values.tlsSecret }}
{{- end }}
