{{- if .Values.scripts }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "personal-external-mcp.fullname" . }}-scripts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "personal-external-mcp.labels" . | nindent 4 }}
data:
  {{- range $name, $content := .Values.scripts }}
  {{ $name }}: |
{{ $content | indent 4 }}
  {{- end }}
{{- end }}
