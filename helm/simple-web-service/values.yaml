namespace: ""
createNamespace: true
privilegedMovers: false

labels: {}
annotations: {}

nameOverride: ""
fullnameOverride: ""

deploymentName: ""
serviceName: ""
ingressName: ""

deployment:
  replicas: 1
  automountServiceAccountToken: false
  serviceAccountName: ""
  labels: {}
  annotations: {}
  podLabels: {}
  podAnnotations: {}

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

persistence:
  enabled: false
  defaults:
    storageClassName: "zfs"
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    volumeMode: Filesystem

  volumes: []

container:
  command: []
  args: []
  env: {}
  envFrom: []
  resources: {}

  livenessProbe:
    enabled: false
    path: /health/live
    port: ""
    httpHeaders: {}
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3

  readinessProbe:
    enabled: false
    path: /health/ready
    port: ""
    httpHeaders: {}
    periodSeconds: 5
    timeoutSeconds: 1
    failureThreshold: 2

  startupProbe:
    enabled: false
    path: /health/live
    port: ""
    httpHeaders: {}
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 10

  port: 8080
  portName: http
  portProtocol: TCP
  volumeMounts: []

  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

service:
  type: ClusterIP
  port: 80
  annotations: {}
  labels: {}

ingress:
  enabled: false
  className: traefik
  host: ""
  path: /
  pathType: Prefix
  annotations: {}
  tls:
    enabled: true
    secretName: ""
  authentikOutpost:
    enabled: false
    serviceName: authentik-server
    serviceNamespace: authentik
    servicePort: 80

networkPolicy:
  enabled: true
  allowSameNamespace: true
  ingressNamespaces: []
