{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "simple-web-service.ingressName" . }}
  namespace: {{ include "simple-web-service.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "simple-web-service.name" . }}
    helm.sh/chart: {{ include "simple-web-service.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- with .Values.ingress.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ required "ingress.host is required when ingress is enabled" .Values.ingress.host | quote }}
      secretName: {{ default (printf "%s-tls" (include "simple-web-service.ingressName" .)) .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ required "ingress.host is required when ingress is enabled" .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path | quote }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "simple-web-service.serviceName" . }}
                port:
                  name: {{ .Values.container.portName }}
{{- end }}
