{{- if and .Values.ingress.enabled .Values.ingress.authentikOutpost.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "simple-web-service.ingressName" . }}-authentik-outpost
  namespace: {{ include "simple-web-service.namespace" . }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ required "ingress.host is required when ingress is enabled" .Values.ingress.host }}`) && PathPrefix(`/outpost.goauthentik.io`)
      kind: Rule
      priority: 100
      services:
        - name: {{ .Values.ingress.authentikOutpost.serviceName }}
          namespace: {{ .Values.ingress.authentikOutpost.serviceNamespace }}
          port: {{ .Values.ingress.authentikOutpost.servicePort }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    secretName: {{ default (printf "%s-tls" (include "simple-web-service.ingressName" .)) .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
