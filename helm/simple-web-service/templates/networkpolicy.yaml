{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "simple-web-service.fullname" . }}
  namespace: {{ include "simple-web-service.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "simple-web-service.name" . }}
    helm.sh/chart: {{ include "simple-web-service.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "simple-web-service.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  {{- if or .Values.networkPolicy.allowSameNamespace .Values.networkPolicy.ingressNamespaces }}
  ingress:
    - from:
        {{- if .Values.networkPolicy.allowSameNamespace }}
        - podSelector: {}
        {{- end }}
        {{- range $namespace := .Values.networkPolicy.ingressNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $namespace | quote }}
        {{- end }}
      ports:
        - protocol: {{ .Values.container.portProtocol }}
          port: {{ .Values.container.portName }}
  {{- else }}
  ingress: []
  {{- end }}
{{- end }}
