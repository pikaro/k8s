apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "simple-web-service.deploymentName" . }}
  namespace: {{ include "simple-web-service.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "simple-web-service.name" . }}
    helm.sh/chart: {{ include "simple-web-service.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
{{- range $key, $value := .Values.deployment.labels }}
    {{ $key }}: {{ $value | quote }}
{{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
{{- range $key, $value := .Values.deployment.annotations }}
    {{ $key }}: {{ $value | quote }}
{{- end }}
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "simple-web-service.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "simple-web-service.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: {{ include "simple-web-service.name" . }}
          image: {{ include "simple-web-service.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.container.securityContext.allowPrivilegeEscalation }}
            capabilities:
{{ toYaml .Values.container.securityContext.capabilities | nindent 14 }}
            runAsNonRoot: {{ .Values.container.securityContext.runAsNonRoot }}
            seccompProfile:
              type: {{ .Values.container.securityContext.seccompProfile.type }}
{{- with .Values.container.args }}
          args:
{{- range . }}
            - {{ . | quote }}
{{- end }}
{{- end }}
{{- with .Values.container.env }}
          env:
{{- range $key, $value := . }}
            - name: {{ $key }}
              value: {{ $value | quote }}
{{- end }}
{{- end }}
          ports:
            - name: {{ .Values.container.portName }}
              containerPort: {{ .Values.container.port }}
              protocol: {{ .Values.container.portProtocol }}
          resources:
{{ toYaml .Values.container.resources | nindent 12 }}
{{- if .Values.container.livenessProbe.enabled }}
          livenessProbe:
            periodSeconds: {{ .Values.container.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.container.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.container.livenessProbe.failureThreshold }}
            httpGet:
              path: {{ .Values.container.livenessProbe.path | quote }}
              port: {{ default .Values.container.port .Values.container.livenessProbe.port }}
              httpHeaders:
  {{- range $key, $value := .Values.container.livenessProbe.httpHeaders }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
{{- end }}
{{- end }}
{{- if .Values.container.readinessProbe.enabled }}
          readinessProbe:
            periodSeconds: {{ .Values.container.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.container.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.container.readinessProbe.failureThreshold }}
            httpGet:
              path: {{ .Values.container.readinessProbe.path | quote }}
              port: {{ default .Values.container.port .Values.container.readinessProbe.port }}
              httpHeaders:
  {{- range $key, $value := .Values.container.readinessProbe.httpHeaders }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
{{- end }}
{{- end }}
{{- if .Values.container.startupProbe.enabled }}
          startupProbe:
            periodSeconds: {{ .Values.container.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.container.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.container.startupProbe.failureThreshold }}
            httpGet:
              path: {{ .Values.container.startupProbe.path | quote }}
              port: {{ default .Values.container.port .Values.container.startupProbe.port }}
              httpHeaders:
  {{- range $key, $value := .Values.container.startupProbe.httpHeaders }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
{{- end }}
{{- end }}
{{- if .Values.container.volumeMounts }}
          volumeMounts:
{{- range $volumeMount := .Values.container.volumeMounts }}
            - name: {{ $volumeMount.name }}
              mountPath: {{ $volumeMount.mountPath | quote }}
              {{- if $volumeMount.subPath }}
              subPath: {{ $volumeMount.subPath | quote }}
              {{- end }}
              {{- if hasKey $volumeMount "readOnly" }}
              readOnly: {{ $volumeMount.readOnly }}
              {{- end }}
{{- end }}
{{- end }}
{{- if and .Values.persistence.enabled .Values.persistence.volumes }}
      volumes:
{{- range $volume := .Values.persistence.volumes }}
        - name: {{ $volume.name }}
          persistentVolumeClaim:
            claimName: {{ printf "%s-%s-pvc" (include "simple-web-service.fullname" $) $volume.name | trunc 63 | trimSuffix "-" }}
{{- end }}
{{- end }}
