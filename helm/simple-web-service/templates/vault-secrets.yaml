{{- if .Values.vault.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.vault.auth.serviceAccountName }}
  namespace: {{ include "simple-web-service.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "simple-web-service.name" . }}
    helm.sh/chart: {{ include "simple-web-service.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault
  namespace: {{ include "simple-web-service.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "simple-web-service.name" . }}
    helm.sh/chart: {{ include "simple-web-service.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    argocd.argoproj.io/sync-wave: "-9"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    vault:
      server: {{ .Values.vault.server | quote }}
      path: {{ .Values.vault.kvMount | quote }}
      version: v2
      auth:
        kubernetes:
          mountPath: {{ .Values.vault.auth.mountPath | quote }}
          role: {{ .Values.vault.auth.role | quote }}
          serviceAccountRef:
            name: {{ .Values.vault.auth.serviceAccountName }}
            audiences:
{{ toYaml .Values.vault.auth.audiences | nindent 14 }}
{{- range $accountName, $account := .Values.vault.serviceAccounts }}
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: {{ printf "%s-%s-machine-auth" (include "simple-web-service.fullname" $) $accountName | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "simple-web-service.namespace" $ }}
  labels:
    app.kubernetes.io/name: {{ include "simple-web-service.name" $ }}
    helm.sh/chart: {{ include "simple-web-service.chart" $ }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  updatePolicy: Replace
  deletionPolicy: None
  refreshInterval: 1h
  secretStoreRefs:
    - name: vault
      kind: SecretStore
  selector:
    secret:
      name: {{ required (printf "vault.serviceAccounts.%s.secretName is required" $accountName) $account.secretName }}
  data:
    {{- range $secretKey := list "username" "password" "authorization" "authentik_username" }}
    - match:
        secretKey: {{ $secretKey }}
        remoteRef:
          remoteKey: {{ printf "%s/machine-auth/%s" (include "simple-web-service.namespace" $) $accountName | quote }}
          property: {{ $secretKey }}
    {{- end }}
{{- end }}
{{- end }}
