name: pgp-gateway

on:
  push:
    paths:
      - ".github/workflows/pgp-gateway.yaml"
      - "sidecars/pgp-gateway/**"
  pull_request:
    paths:
      - ".github/workflows/pgp-gateway.yaml"
      - "sidecars/pgp-gateway/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecars/pgp-gateway
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/pgp-gateway/go.mod
          cache-dependency-path: sidecars/pgp-gateway/go.sum

      - name: Test
        run: CGO_ENABLED=0 go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read image manifest
        id: image
        shell: bash
        run: |
          set -euo pipefail
          source sidecars/pgp-gateway/image.env
          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${GITHUB_SHA::12}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: sidecars/pgp-gateway
          file: sidecars/pgp-gateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.version }}
            ${{ steps.image.outputs.image }}:sha-${{ steps.image.outputs.short_sha }}
