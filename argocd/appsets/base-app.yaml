apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: "base"
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  syncPolicy:
    applicationsSync: create-update

  generators:
    - git:
        repoURL: https://github.com/pikaro/k8s.git
        revision: main
        files:
          - path: "argocd/catalog/base/*.yaml"

  template:
    metadata:
      name: "{{ .name }}"
    spec:
      project: '{{ dig "project" "base" . }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ dig "namespace" .name . }}'

  templatePatch: |
    {{- $name := .name }}
    {{- $sourceType := dig "sourceType" "helm" . }}
    {{- $basePath := dig "basePath" (printf "services/base/%s" $name) . }}
    {{- $chart := dig "chart" $name . }}
    {{- $releaseName := dig "releaseName" $name . }}
    {{- $valuesFile := dig "valuesFile" (printf "services/base/%s/values.yaml" $name) . }}
    {{- $requirementsPath := dig "requirementsPath" "" . }}
    {{- $resourcesPath := dig "resourcesPath" "" . }}
    {{- $extraHelmSources := dig "extraHelmSources" (list) . }}
    {{- $authentik := dig "authentik" (dict) . }}
    {{- $serviceAccounts := dig "serviceAccounts" (dict) $authentik }}
    {{- $createNamespace := eq (dig "createNamespace" "true" .) "true" }}
    {{- $serverSideApply := eq (dig "serverSideApply" "false" .) "true" }}
    {{- $skipDryRunOnMissingResource := eq (dig "skipDryRunOnMissingResource" "false" .) "true" }}
    spec:
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
      {{- if $createNamespace }}
          - CreateNamespace=true
      {{- end }}
      {{- if $serverSideApply }}
          - ServerSideApply=true
      {{- end }}
      {{- if $skipDryRunOnMissingResource }}
          - SkipDryRunOnMissingResource=true
      {{- end }}
      sources:
        {{- if eq $sourceType "kustomize" }}
        - repoURL: https://github.com/pikaro/k8s.git
          targetRevision: main
          path: {{ $basePath }}
        {{- else if eq $sourceType "helmLocal" }}
        - repoURL: https://github.com/pikaro/k8s.git
          targetRevision: main
          path: {{ $basePath }}
          helm:
            releaseName: {{ $releaseName }}
            valueFiles:
              - $values/{{ $valuesFile }}
            {{- if and (eq $basePath "helm/simple-web-service") $serviceAccounts }}
            values: |
              vault:
                enabled: true
                serviceAccounts:
                {{- range $accountName := keys $serviceAccounts | sortAlpha }}
                  {{ $accountName }}:
                    secretName: {{ dig "secretName" (printf "%s-%s-auth" $name $accountName) (index $serviceAccounts $accountName) }}
                {{- end }}
            {{- end }}
        {{- else if eq $sourceType "helm" }}
        - repoURL: {{ .chartRepo }}
          chart: {{ $chart }}
          targetRevision: {{ .chartVersion }}
          helm:
            releaseName: {{ $releaseName }}
            valueFiles:
              - $values/{{ $valuesFile }}
        {{- end }}
        {{- if or (eq $sourceType "helm") (eq $sourceType "helmLocal") $extraHelmSources }}
        - repoURL: https://github.com/pikaro/k8s.git
          targetRevision: main
          ref: values
        {{- end }}
        {{- if $requirementsPath }}
        - repoURL: https://github.com/pikaro/k8s.git
          targetRevision: main
          path: {{ $requirementsPath }}
        {{- end }}
        {{- if $resourcesPath }}
        - repoURL: https://github.com/pikaro/k8s.git
          targetRevision: main
          path: {{ $resourcesPath }}
        {{- end }}
        {{- range $extraHelmSource := $extraHelmSources }}
        - repoURL: https://github.com/pikaro/k8s.git
          targetRevision: main
          path: {{ $extraHelmSource.path }}
          helm:
            releaseName: {{ $extraHelmSource.releaseName }}
            valueFiles:
              - $values/{{ $extraHelmSource.valuesFile }}
        {{- end }}
