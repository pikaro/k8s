apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: "app"
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  syncPolicy:
    applicationsSync: create-update

  generators:
    - git:
        repoURL: https://github.com/pikaro/k8s.git
        revision: main
        files:
          - path: "argocd/catalog/app/*.yaml"

  template:
    metadata:
      name: "{{ .name }}"
    spec:
      project: '{{ dig "project" "app" . }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ dig "namespace" .name . }}'

  templatePatch: |
    {{- $name := .name }}
    {{- $sourceType := dig "sourceType" "helm" . }}
    {{- $basePath := dig "basePath" (printf "services/app/%s" $name) . }}
    {{- $chart := dig "chart" $name . }}
    {{- $releaseName := dig "releaseName" $name . }}
    {{- $valuesFile := dig "valuesFile" (printf "services/app/%s/values.yaml" $name) . }}
    {{- $localValuesFile := dig "valuesFile" "values.yaml" . }}
    {{- $requirementsPath := dig "requirementsPath" "" . }}
    {{- $resourcesPath := dig "resourcesPath" "" . }}
    {{- $extraHelmSources := dig "extraHelmSources" (list) . }}
    {{- $serverSideApply := eq (dig "serverSideApply" "false" .) "true" }}
    {{- $skipDryRunOnMissingResource := eq (dig "skipDryRunOnMissingResource" "false" .) "true" }}
    spec:
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
      {{- if $serverSideApply }}
          - ServerSideApply=true
      {{- end }}
      {{- if $skipDryRunOnMissingResource }}
          - SkipDryRunOnMissingResource=true
      {{- end }}
      sources:
        {{- if eq $sourceType "kustomize" }}
        - repoURL: https://github.com/pikaro/k8s.git
          targetRevision: main
          path: {{ $basePath }}
        {{- else if eq $sourceType "helmLocal" }}
        - repoURL: https://github.com/pikaro/k8s.git
          targetRevision: main
          path: {{ $basePath }}
          helm:
            releaseName: {{ $releaseName }}
            valueFiles:
              - {{ $localValuesFile }}
        {{- else if eq $sourceType "helm" }}
        - repoURL: {{ .chartRepo }}
          chart: {{ $chart }}
          targetRevision: {{ .chartVersion }}
          helm:
            releaseName: {{ $releaseName }}
            valueFiles:
              - $values/{{ $valuesFile }}
        {{- end }}
        {{- if or (eq $sourceType "helm") $extraHelmSources }}
        - repoURL: https://github.com/pikaro/k8s.git
          targetRevision: main
          ref: values
        {{- end }}
        {{- if $requirementsPath }}
        - repoURL: https://github.com/pikaro/k8s.git
          targetRevision: main
          path: {{ $requirementsPath }}
        {{- end }}
        {{- if $resourcesPath }}
        - repoURL: https://github.com/pikaro/k8s.git
          targetRevision: main
          path: {{ $resourcesPath }}
        {{- end }}
        {{- range $extraHelmSource := $extraHelmSources }}
        - repoURL: https://github.com/pikaro/k8s.git
          targetRevision: main
          path: {{ $extraHelmSource.path }}
          helm:
            releaseName: {{ $extraHelmSource.releaseName }}
            valueFiles:
              - $values/{{ $extraHelmSource.valuesFile }}
        {{- end }}
