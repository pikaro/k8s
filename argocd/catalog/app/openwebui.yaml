authentik:
  name: openwebui
  slug: openwebui
  protocol: proxy
  hidden: true
  url: https://ai.d-reis.com
  directoryGroups:
    - ai-users
    - openwebui-users
  proxy:
    mode: forward_single
    externalHost: https://ai.d-reis.com
    agentTokenAuth: true
